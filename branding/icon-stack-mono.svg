<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <title>Event modeling cards</title>
  <!-- Single color only (#000000 — swap for currentColor). The two cards behind
       are drawn as corner brackets so the front card needs no occluding fill. -->
  <g fill="none" stroke="#000000" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M8 84 L8 20 Q8 8 20 8 L84 8"/>
    <path d="M26 102 L26 38 Q26 26 38 26 L102 26"/>
    <rect x="44" y="44" width="76" height="76" rx="12"/>
  </g>
  <!-- note lines on the front card -->
  <g fill="#000000">
    <rect x="58" y="76" width="42" height="5" rx="2.5"/>
    <rect x="58" y="90" width="30" height="5" rx="2.5"/>
  </g>
</svg>
